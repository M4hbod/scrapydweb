# Turnkey deployment: pulls the prebuilt scrapydweb image from GHCR and runs it
# with PostgreSQL. Point it at your own Scrapyd node(s).
#
#   curl -O https://raw.githubusercontent.com/M4hbod/scrapydweb/master/docker-compose.deploy.yml
#   docker compose -f docker-compose.deploy.yml up -d
#   open http://127.0.0.1:5000   (first visit creates the admin account)
#
# Pin a version with SCRAPYDWEB_TAG (default: latest).
# Set SCRAPYD_SERVERS to your scrapyd node(s) -- this only SEEDS the config; you
# can also add/edit nodes from the Settings page once the app is running.

name: scrapydweb

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scrapydweb
      POSTGRES_PASSWORD: scrapydweb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapydweb"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  scrapydweb:
    image: ghcr.io/m4hbod/scrapydweb:${SCRAPYDWEB_TAG:-latest}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    # reach a scrapyd running on the docker host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://scrapydweb:scrapydweb@postgres:5432
      # Your scrapyd node(s), comma-separated: user:pass@host:port#group
      # e.g. admin:12345@host.docker.internal:6800
      SCRAPYD_SERVERS: ${SCRAPYD_SERVERS:-}
      CHECK_APP_CONFIG: "true"
      ENABLE_SLACK_ALERT: "false"
      ENABLE_TELEGRAM_ALERT: "false"
      ENABLE_EMAIL_ALERT: "false"
    restart: unless-stopped

volumes:
  pgdata:
