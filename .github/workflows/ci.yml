name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (fast suite)
    runs-on: ubuntu-latest
    services:
      postgres:
        # ECR mirror avoids Docker Hub's anonymous pull rate limit on CI runners
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_USER: scrapydweb
          POSTGRES_PASSWORD: scrapydweb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scrapydweb"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://scrapydweb:scrapydweb@localhost:5432
      SCRAPYDWEB_TESTMODE: "True"
      NO_PROXY: scrapydweb-fake-domain.com,127.0.0.1,localhost
      ENABLE_SLACK_ALERT: "False"
      ENABLE_TELEGRAM_ALERT: "False"
      ENABLE_EMAIL_ALERT: "False"
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run fast suite with coverage
        # the fast suite uses an in-process fake scrapyd -- no real scrapyd needed
        run: uv run pytest -m "not live" -q --cov=scrapydweb --cov-report=term-missing

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check + build
        run: npm run build
        working-directory: frontend

  image:
    name: Docker image
    runs-on: ubuntu-latest
    # only builds once tests AND the SPA build pass -- a red suite blocks the image
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # PRs (esp. from forks) can't push packages -- build-only there
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/m4hbod/scrapydweb
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          # publish only from main and version tags; PRs just validate the build
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
