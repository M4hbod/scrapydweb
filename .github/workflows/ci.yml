name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests (fast suite)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scrapydweb
          POSTGRES_PASSWORD: scrapydweb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scrapydweb"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://scrapydweb:scrapydweb@localhost:5432
      SCRAPYDWEB_TESTMODE: "True"
      NO_PROXY: scrapydweb-fake-domain.com,127.0.0.1,localhost
      ENABLE_SLACK_ALERT: "False"
      ENABLE_TELEGRAM_ALERT: "False"
      ENABLE_EMAIL_ALERT: "False"
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run fast suite with coverage
        # the fast suite uses an in-process fake scrapyd -- no real scrapyd needed
        run: uv run pytest -m "not live" -q --cov=scrapydweb --cov-report=term-missing

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Type-check + build
        run: npm run build
        working-directory: frontend

  docker:
    name: Docker build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: scrapydweb
            dockerfile: docker/Dockerfile
          - image: scrapyd
            dockerfile: docker/Dockerfile.scrapyd
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
