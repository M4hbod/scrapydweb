# Alembic config. Database URLs come from DATABASE_URL via migrations/env.py
# (one engine per bind: timer_tasks, metadata, jobs -- each database carries
# its own alembic_version table).

[alembic]
script_location = scrapydweb/migrations
prepend_sys_path = .
databases = timer_tasks, metadata, jobs

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
