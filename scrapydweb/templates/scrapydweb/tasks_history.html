<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer Tasks History - ScrapydWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{{ static_css_tailwind }}">
</head>
<body style="padding-left:0;">
  <div class="max-w-[1100px] mx-auto px-6 py-8">
    <div class="flex items-end gap-3 flex-wrap mb-5">
      <div>
        <h1 class="font-mono font-bold text-[22px] tracking-tight m-0 text-fg">Timer Tasks &mdash; History</h1>
        <p class="mt-1 mb-0 text-muted text-[13px]">Append-only log of added/edited/fired timer tasks and scheduler exceptions.</p>
      </div>
      <a class="btn" href="javascript:location.reload(true);" style="margin-left:auto;">Refresh</a>
    </div>
    {% if log %}
    <section class="logview">
      <div class="hd"><h2>History log</h2></div>
      <div class="logscroll" style="max-height: 76vh;"><pre>{{ log|safe }}</pre></div>
    </section>
    {% else %}
    <div class="bg-surface border border-line-soft rounded-card shadow-card p-8 text-center text-muted-2 font-mono text-[13px]">
      No history yet.
    </div>
    {% endif %}
  </div>
</body>
</html>
